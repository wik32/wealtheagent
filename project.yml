name: WealthEagent
options:
  bundleIdPrefix: de.wealtheagent
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  WealthEagent:
    type: application
    platform: iOS
    bundleId: de.wealtheagent.app
    deploymentTarget: "17.0"
    sources:
      - path: WealthEagent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.wealtheagent.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: WealthEagent/Info.plist
    entitlements:
      path: WealthEagent/WealthEagent.entitlements
      # CloudKit wird aktiviert sobald paid Developer Account vorhanden.
      # Bis dahin: LocalContractRepository (SwiftData)
    resources:
      - path: WealthEagent/Resources
    dependencies: []
    preBuildScripts:
      - name: SwiftLint
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi

  WealthEagentTests:
    type: bundle.unit-test
    platform: iOS
    bundleId: de.wealtheagent.tests
    deploymentTarget: "17.0"
    sources:
      - path: WealthEagentTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.wealtheagent.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: WealthEagent

schemes:
  WealthEagent:
    build:
      targets:
        WealthEagent: all
        WealthEagentTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WealthEagentTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
